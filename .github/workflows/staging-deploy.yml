name: Staging Deploy

on:
  push:
    branches:
      - initial-ecommerce-release

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Admin Dependencies
        run: |
          cd admin
          npm install

      - name: Build Admin
        run: |
          cd admin
          npm run build

      - name: Build Client
        run: |
          cd client
          npm install
          npm run build

      - name: Build Backend
        run: |
          cd server
          npm install

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/test/Biluibaba-legacy
            git pull origin initial-ecommerce-release

            cd admin
            npm install
            npm run build

            cd ../client
            npm install
            npm run build

            cd ../server
            npm install

            pm2 reload all