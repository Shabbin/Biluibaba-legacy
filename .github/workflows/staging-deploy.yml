name: Staging Deploy

on:
  push:
    branches:
      - initial-ecommerce-release

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---------- BUILD ADMIN ----------
      - name: Build Admin
        run: |
          cd admin
          npm install --legacy-peer-deps
          npm run build

      # ---------- BUILD CLIENT ----------
      - name: Build Client
        run: |
          cd client
          npm install --legacy-peer-deps
          npm run build

      # ---------- INSTALL SERVER ----------
      - name: Install Backend
        run: |
          cd server
          npm install --legacy-peer-deps

      # ---------- DEPLOY ----------
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 5m
          script: |
            set -e

            echo "Updating project..."

            cd /root/test/Biluibaba-legacy

            git fetch origin
            git reset --hard origin/initial-ecommerce-release

            echo "Restarting services..."

            pm2 reload admin-site-test
            pm2 reload main-site-test
            pm2 reload backend-test
            pm2 reload app-site-test

            echo "Deployment finished!"