name: Staging Deploy

on:
  push:
    branches:
      - initial-ecommerce-release

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ---------- INSTALL ROOT DEPENDENCIES ----------
      - name: Install dependencies
        run: |
          cd admin && npm install --legacy-peer-deps
          cd ../client && npm install --legacy-peer-deps
          cd ../server && npm install --legacy-peer-deps

      # ---------- BUILD PROJECT ----------
      - name: Build Admin
        run: |
          cd admin
          npm run build

      - name: Build Client
        run: |
          cd client
          npm run build

      # ---------- DEPLOY (FAST) ----------
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 5m
          script: |
            set -e

            echo "Deploying latest code..."

            cd /root/test/Biluibaba-legacy

            git fetch origin
            git reset --hard origin/initial-ecommerce-release

            echo "Restarting PM2 services..."

            pm2 reload admin-site-test
            pm2 reload main-site-test
            pm2 reload backend-test
            pm2 reload app-site-test

            echo "Deployment complete."