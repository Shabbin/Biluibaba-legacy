name: Staging Deploy

on:
  push:
    branches:
      - initial-ecommerce-release

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------- CONNECT & DEPLOY ----------
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            set -e

            echo "🚀 Starting deployment..."

            cd /root/test/Biluibaba-legacy

            echo "📥 Pulling latest code..."
            git fetch origin
            git reset --hard origin/initial-ecommerce-release

            echo "📦 Installing dependencies..."

            cd admin
            npm install --legacy-peer-deps

            cd ../client
            npm install --legacy-peer-deps

            cd ../server
            npm install --legacy-peer-deps

            echo "🧹 Cleaning old builds..."

            rm -rf ../admin/.next
            rm -rf ../client/.next

            echo "⚙️ Building applications..."

            cd ../admin
            npm run build

            cd ../client
            npm run build

            echo "🔄 Reloading PM2 processes..."

            pm2 reload admin-site-test
            pm2 reload main-site-test
            pm2 reload backend-test
            pm2 reload app-site-test

            echo "✅ Deployment completed successfully."