name: Staging Deploy

on:
  push:
    branches:
      - initial-ecommerce-release

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 90m

          script: |
            set -e

            echo "🚀 Starting deployment..."

            cd /root/test/Biluibaba-legacy

            echo "📥 Pulling latest code..."
            git fetch origin

            PREVIOUS_COMMIT=$(git rev-parse HEAD)

            git reset --hard origin/initial-ecommerce-release

            echo "🔍 Detecting changes..."

            CHANGED_FILES=$(git diff --name-only $PREVIOUS_COMMIT HEAD)

            ADMIN_CHANGED=false
            CLIENT_CHANGED=false
            SERVER_CHANGED=false

            if echo "$CHANGED_FILES" | grep -q "^admin/"; then
              ADMIN_CHANGED=true
            fi

            if echo "$CHANGED_FILES" | grep -q "^client/"; then
              CLIENT_CHANGED=true
            fi

            if echo "$CHANGED_FILES" | grep -q "^server/"; then
              SERVER_CHANGED=true
            fi

            echo "📦 Installing dependencies if needed..."

            if [ ! -d "admin/node_modules" ]; then
              echo "Installing admin dependencies..."
              cd admin
              npm install --legacy-peer-deps
              cd ..
            fi

            if [ ! -d "client/node_modules" ]; then
              echo "Installing client dependencies..."
              cd client
              npm install --legacy-peer-deps
              cd ..
            fi

            if [ ! -d "server/node_modules" ]; then
              echo "Installing server dependencies..."
              cd server
              npm install --legacy-peer-deps
              cd ..
            fi

            echo "⚙️ Building applications..."

            if [ "$ADMIN_CHANGED" = true ]; then
              echo "🧹 Cleaning admin build..."
              rm -rf admin/.next

              echo "⚙️ Building admin..."
              (
                cd admin
                npm run build
              )
            else
              echo "⏭️ No admin changes detected."
            fi

            if [ "$CLIENT_CHANGED" = true ]; then
              echo "🧹 Cleaning client build..."
              rm -rf client/.next

              echo "⚙️ Building client..."
              (
                cd client
                npm run build
              )
            else
              echo "⏭️ No client changes detected."
            fi

            echo "🔄 Reloading PM2 processes..."

            if [ "$ADMIN_CHANGED" = true ]; then
              pm2 reload admin-site-test
            fi

            if [ "$CLIENT_CHANGED" = true ]; then
              pm2 reload main-site-test
            fi

            if [ "$SERVER_CHANGED" = true ]; then
              pm2 reload backend-test
            fi

            echo "🔄 Reloading app site..."
            pm2 reload app-site-test

            echo "✅ Deployment completed successfully."